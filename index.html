<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="منصة متخصصة في خدمات إصلاح وصيانة المنازل والمحلات التجارية." />
    <title>خدمات الإصلاح والصيانة</title>
    <style>
      body {
        margin: 0;
        direction: rtl;
      }

      .app-loading {
        align-items: center;
        background: var(--background, #ffffff);
        color: var(--muted-foreground, #475569);
        display: flex;
        font-family:
          "Segoe UI",
          Tahoma,
          Geneva,
          Verdana,
          Arial,
          sans-serif;
        gap: 0.75rem;
        justify-content: center;
        min-height: 100vh;
      }

      .app-loading__indicator {
        animation: app-loading-spin 0.8s linear infinite;
        border: 2px solid currentColor;
        border-radius: 9999px;
        border-top-color: transparent;
        height: 1rem;
        width: 1rem;
      }

      @keyframes app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-loading__indicator {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="app-loading" data-app-loading role="status" aria-live="polite">
        <span class="app-loading__indicator" aria-hidden="true"></span>
        <span>جاري التحميل...</span>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
